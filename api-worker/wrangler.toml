name = "embedchat-api"
main = "src/index.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "REPLACE_WITH_KV_NAMESPACE_ID"
preview_id = "REPLACE_WITH_KV_NAMESPACE_ID"

[vars]
ENVIRONMENT = "production"

[[queues.producers]]
binding = "INGEST_QUEUE"
queue = "embedchat-ingest"
